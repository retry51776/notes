<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Dark Slidev slide background</title>
  <desc id="desc">A dark abstract presentation background with subtle grid lines, soft glows, and geometric accents.</desc>
  <defs>
    <linearGradient id="baseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="45%" stop-color="#0b1227"/>
      <stop offset="100%" stop-color="#02040b"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="0%" cy="12%" r="70%">
      <stop offset="0%" stop-color="#3dd9c4" stop-opacity="0.30"/>
      <stop offset="45%" stop-color="#0f766e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightGlow" cx="100%" cy="100%" r="72%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.24"/>
      <stop offset="40%" stop-color="#2563eb" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerHighlight" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0"/>
      <stop offset="30%" stop-color="#93c5fd" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#2dd4bf" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <pattern id="gridPattern" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M 96 0 L 0 0 0 96" fill="none" stroke="#cbd5e1" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="dotPattern" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="24" r="1.8" fill="#e2e8f0" fill-opacity="0.14"/>
      <circle cx="122" cy="56" r="1.2" fill="#38bdf8" fill-opacity="0.16"/>
      <circle cx="84" cy="128" r="1.4" fill="#5eead4" fill-opacity="0.12"/>
    </pattern>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="beamBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#baseGradient)"/>
  <rect width="1920" height="1080" fill="url(#leftGlow)"/>
  <rect width="1920" height="1080" fill="url(#rightGlow)"/>
  <rect width="1920" height="1080" fill="url(#centerHighlight)"/>
  <rect width="1920" height="1080" fill="url(#gridPattern)"/>
  <rect width="1920" height="1080" fill="url(#dotPattern)"/>

  <g filter="url(#softBlur)">
    <circle cx="360" cy="210" r="210" fill="#14b8a6" fill-opacity="0.16"/>
    <circle cx="1530" cy="840" r="240" fill="#3b82f6" fill-opacity="0.14"/>
    <ellipse cx="960" cy="520" rx="420" ry="180" fill="#f8fafc" fill-opacity="0.06"/>
  </g>

  <g opacity="0.9">
    <path d="M 0 820 C 260 720 520 740 840 850 S 1460 1010 1920 870 L 1920 1080 L 0 1080 Z" fill="#020617" fill-opacity="0.58"/>
    <path d="M 0 980 C 220 900 460 920 760 1020 S 1410 1110 1920 1000 L 1920 1080 L 0 1080 Z" fill="#020617" fill-opacity="0.78"/>
  </g>

  <g filter="url(#beamBlur)">
    <path d="M -120 220 L 680 160" stroke="url(#beamGradient)" stroke-width="10" stroke-linecap="round"/>
    <path d="M 1240 890 L 2020 760" stroke="url(#beamGradient)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M 0 246 C 260 210 520 188 810 198" stroke="#67e8f9" stroke-opacity="0.18" stroke-width="2"/>
    <path d="M 1110 886 C 1340 850 1590 792 1920 690" stroke="#93c5fd" stroke-opacity="0.18" stroke-width="2"/>
    <path d="M 160 942 L 560 942" stroke="#e2e8f0" stroke-opacity="0.10" stroke-width="1.5"/>
    <path d="M 1360 176 L 1760 176" stroke="#e2e8f0" stroke-opacity="0.10" stroke-width="1.5"/>
  </g>

  <g>
    <rect x="128" y="128" width="340" height="180" rx="22" fill="#0f172a" fill-opacity="0.18" stroke="#67e8f9" stroke-opacity="0.16"/>
    <rect x="1450" y="760" width="280" height="156" rx="22" fill="#0f172a" fill-opacity="0.18" stroke="#93c5fd" stroke-opacity="0.16"/>
    <path d="M 1520 224 L 1734 224 L 1792 282 L 1792 468 L 1520 468 Z" fill="#0b1120" fill-opacity="0.18" stroke="#cbd5e1" stroke-opacity="0.12"/>
    <circle cx="1628" cy="346" r="78" fill="none" stroke="#5eead4" stroke-opacity="0.18" stroke-width="2"/>
    <circle cx="1628" cy="346" r="46" fill="none" stroke="#93c5fd" stroke-opacity="0.18" stroke-width="2"/>
  </g>
</svg>
