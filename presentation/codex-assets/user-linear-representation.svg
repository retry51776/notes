<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .title { font: 700 40px 'Inter', 'Segoe UI', sans-serif; fill: #0f172a; }
      .head { font: 700 28px 'Inter', 'Segoe UI', sans-serif; fill: #0f172a; }
      .small { font: 500 21px 'Inter', 'Segoe UI', sans-serif; fill: #334155; }
      .mono { font: 600 22px 'SFMono-Regular', Menlo, Consolas, monospace; fill: #0f172a; }
      .box { rx: 16; ry: 16; stroke-width: 3; }
      .axis { stroke: #64748b; stroke-width: 3; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155" />
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="70" text-anchor="middle" class="title">Linear Representation of a Token</text>

  <rect x="70" y="110" width="300" height="160" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="205" y="158" text-anchor="middle" class="head">Token</text>
  <text x="205" y="198" text-anchor="middle" class="mono">" user " -> id 3097</text>

  <line x1="370" y1="190" x2="380" y2="190" class="axis" marker-end="url(#arrow)"/>

  <rect x="380" y="110" width="480" height="160" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="620" y="158" text-anchor="middle" class="head">Embedding Vector</text>
  <text x="620" y="198" text-anchor="middle" class="mono">" user" = [0.12, -0.45, ..., 0.08]</text>
  <text x="620" y="232" text-anchor="middle" class="small">user in R^d_model</text>

  <line x1="860" y1="190" x2="875" y2="190" class="axis" marker-end="url(#arrow)"/>

  <rect x="890" y="110" width="300" height="160" class="box" fill="#ffedd5" stroke="#ea580c"/>
  <text x="1040" y="158" text-anchor="middle" class="head">Linear Layer</text>
  <text x="1040" y="198" text-anchor="middle" class="mono">y = W * " user" + b</text>
  <text x="1040" y="232" text-anchor="middle" class="small">Used by attention and MLP</text>

  <rect x="70" y="330" width="1135" height="320" class="box" fill="#eef2ff" stroke="#6366f1"/>
  <text x="140" y="380" class="head">Semantic Space (2D view for intuition)</text>

  <line x1="170" y1="590" x2="1130" y2="590" class="axis" marker-end="url(#arrow)"/>
  <line x1="170" y1="590" x2="170" y2="430" class="axis" marker-end="url(#arrow)"/>
  <text x="1140" y="610" class="small">feature 1</text>
  <text x="124" y="425" class="small">feature 2</text>

  <circle cx="730" cy="515" r="13" fill="#dc2626"/>
  <text x="750" y="520" class="mono">user</text>

  <circle cx="790" cy="500" r="10" fill="#2563eb"/>
  <text x="806" y="505" class="small">assistant</text>

  <circle cx="690" cy="540" r="10" fill="#16a34a"/>
  <text x="706" y="545" class="small">profile</text>

  <circle cx="460" cy="470" r="10" fill="#7c3aed"/>
  <text x="476" y="475" class="small">banana</text>

  <text x="640" y="640" text-anchor="middle" class="small">Nearby vectors tend to encode related usage patterns.</text>
</svg>
