<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <style>
      .title { font: 700 42px 'Inter', 'Segoe UI', sans-serif; fill: #111827; }
      .label { font: 600 28px 'Inter', 'Segoe UI', sans-serif; fill: #111827; }
      .mono { font: 600 24px 'SFMono-Regular', Menlo, Consolas, monospace; fill: #0f172a; }
      .id { font: 700 28px 'SFMono-Regular', Menlo, Consolas, monospace; fill: #1d4ed8; }
      .card { rx: 20; ry: 20; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="640" y="82" text-anchor="middle" class="title">How Tokenization Works</text>

  <rect x="90" y="170" width="1100" height="120" class="card" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="130" y="242" class="mono">"Transformers are useful!"</text>

  <line x1="640" y1="300" x2="640" y2="350" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="660" y="332" class="label">Tokenizer</text>

  <rect x="110" y="380" width="240" height="120" class="card" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="230" y="446" text-anchor="middle" class="mono">"Trans"</text>
  <text x="230" y="482" text-anchor="middle" class="id">5021</text>

  <rect x="390" y="380" width="240" height="120" class="card" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/>
  <text x="510" y="446" text-anchor="middle" class="mono">"formers"</text>
  <text x="510" y="482" text-anchor="middle" class="id">12873</text>

  <rect x="670" y="380" width="240" height="120" class="card" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="790" y="446" text-anchor="middle" class="mono">" are"</text>
  <text x="790" y="482" text-anchor="middle" class="id">527</text>

  <rect x="950" y="380" width="240" height="120" class="card" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <text x="1070" y="446" text-anchor="middle" class="mono">" useful!"</text>
  <text x="1070" y="482" text-anchor="middle" class="id">9034</text>

  <text x="640" y="610" text-anchor="middle" class="label">Tokenizer picks variable-length chunks, then maps each chunk to an ID.</text>
</svg>
