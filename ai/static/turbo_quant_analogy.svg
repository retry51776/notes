  <text x="72" y="150" class="title">TurboQuant Analogy</text>
  <text x="72" y="182" class="deck">Different paintings start with different color vocabularies. Mix the colors, reduce them to just 8 levels,</text>
  <text x="72" y="208" class="deck">then repaint the picture using only that tiny palette.</text>

  <circle cx="384" cy="228" r="8" fill="#E65B57"/>
  <text x="402" y="233" class="colLabel">Painting A</text>
  <circle cx="768" cy="228" r="8" fill="#6755D8"/>
  <text x="786" y="233" class="colLabel">Painting B</text>

  <g filter="url(#shadow)">
    <rect x="60" y="246" width="280" height="136" rx="28" fill="url(#stepCard)"/>
    <!-- max chars per line: 18, max lines: 3. -->
    <rect x="358" y="246" width="782" height="136" rx="28" fill="#FFFFFF" fill-opacity="0.92"/>
    <!-- max chars per line: 34, max lines: 2. -->
  </g>
  <g transform="translate(-8 -14)">
    <circle cx="82" cy="277" r="24" fill="#F4BF62"/>
    <text x="74" y="288" class="stepNum">1</text>
    <text x="118" y="292" class="stepHead">Different Paintings</text>
    <text x="103" y="316" class="stepCopy">Each painting (KV block) has its</text>
    <text x="103" y="336" class="stepCopy">set of colors (number distribution).</text>
    <text x="103" y="362" class="stepCopy">Different color vocabularies.</text>
  </g>
  <use href="#paintingWarm" x="374" y="256" width="366" height="116"/>
  <use href="#paintingCool" x="758" y="256" width="366" height="116"/>
  <text x="396" y="278" class="panelHead">Original painting</text>
  <text x="780" y="278" class="panelHead">Original painting</text>

  <g filter="url(#shadow)">
    <rect x="60" y="396" width="280" height="136" rx="28" fill="url(#stepCard)"/>
    <!-- max chars per line: 18, max lines: 3. -->
    <rect x="358" y="396" width="782" height="136" rx="28" fill="#FFFFFF" fill-opacity="0.92"/>
    <!-- max chars per line: 34, max lines: 2. -->
  </g>
  <g transform="translate(-8 -14)">
    <circle cx="82" cy="427" r="24" fill="#F4BF62"/>
    <text x="74" y="438" class="stepNum">2</text>
    <text x="118" y="442" class="stepHead">Color Collections</text>
    <text x="103" y="466" class="stepCopy">Pull the colors out of each painting.</text>
    <text x="103" y="486" class="stepCopy">Now each work looks like a bag of</text>
    <text x="103" y="506" class="stepCopy">stored color values instead of a scene.</text>
  </g>
  <use href="#collectionWarm" x="374" y="406" width="366" height="116"/>
  <use href="#collectionCool" x="758" y="406" width="366" height="116"/>
  <text x="396" y="428" class="panelHead">Extracted color</text>
  <text x="780" y="428" class="panelHead">Extracted color</text>

  <g filter="url(#shadow)">
    <rect x="60" y="546" width="280" height="136" rx="28" fill="url(#stepCard)"/>
    <!-- max chars per line: 18, max lines: 3. -->
    <rect x="358" y="546" width="782" height="136" rx="28" fill="#FFFFFF" fill-opacity="0.92"/>
    <!-- max chars per line: 34, max lines: 2. -->
  </g>
  <g transform="translate(-8 -14)">
    <circle cx="82" cy="577" r="24" fill="#F4BF62"/>
    <text x="74" y="588" class="stepNum">3</text>
    <text x="118" y="592" class="stepHead">Random Rotation</text>
    <text x="103" y="616" class="stepCopy">Pour the colors into a jar and shake.</text>
    <text x="103" y="636" class="stepCopy">Rotation spreads colors</text>
    <text x="103" y="656" class="stepCopy">into a more uniform blend.</text>
  </g>
  <use href="#jarWarm" x="374" y="556" width="366" height="116"/>
  <use href="#jarCool" x="758" y="556" width="366" height="116"/>
  <text x="396" y="578" class="panelHead">Mixed colors</text>
  <text x="780" y="578" class="panelHead">Mixed colors</text>

  <g filter="url(#shadow)">
    <rect x="60" y="696" width="280" height="136" rx="28" fill="url(#stepCard)"/>
    <!-- max chars per line: 18, max lines: 3. -->
    <rect x="358" y="696" width="782" height="136" rx="28" fill="#FFFFFF" fill-opacity="0.92"/>
    <!-- max chars per line: 34, max lines: 2. -->
  </g>
  <g transform="translate(-8 -14)">
    <circle cx="82" cy="727" r="24" fill="#F4BF62"/>
    <text x="74" y="738" class="stepNum">4</text>
    <text x="118" y="742" class="stepHead">8 Color Palette</text>
    <text x="103" y="766" class="stepCopy">TurboQuant keeps only a few discrete</text>
    <text x="103" y="786" class="stepCopy">levels. In the analogy, we keep just</text>
    <text x="103" y="806" class="stepCopy">8 colors that can stand in for the mix.</text>
  </g>
  <use href="#paletteWarm" x="374" y="706" width="366" height="116"/>
  <use href="#paletteCool" x="758" y="706" width="366" height="116"/>
  <text x="396" y="728" class="panelHead">Quantized palette</text>
  <text x="780" y="728" class="panelHead">Quantized palette</text>

  <g filter="url(#shadow)">
    <rect x="60" y="846" width="280" height="136" rx="28" fill="url(#stepCard)"/>
    <!-- max chars per line: 18, max lines: 3. -->
    <rect x="358" y="846" width="782" height="136" rx="28" fill="#FFFFFF" fill-opacity="0.92"/>
    <!-- max chars per line: 34, max lines: 2. -->
  </g>
  <g transform="translate(-8 -14)">
    <circle cx="82" cy="877" r="24" fill="#F4BF62"/>
    <text x="74" y="888" class="stepNum">5</text>
    <text x="118" y="892" class="stepHead">Repaint</text>
    <text x="103" y="916" class="stepCopy">Redraw the original scene using only</text>
    <text x="103" y="936" class="stepCopy">those 8 colors. Detail survives, but the</text>
    <text x="103" y="956" class="stepCopy">storage cost is far smaller.</text>
  </g>
  <use href="#repaintWarm" x="374" y="856" width="366" height="116"/>
  <use href="#repaintCool" x="758" y="856" width="366" height="116"/>
  <text x="396" y="878" class="panelHead">Repainted with 8 colors</text>
  <text x="780" y="878" class="panelHead">Repainted with 8 colors</text>

  <g filter="url(#shadow)">
    <rect x="60" y="1012" width="1080" height="120" rx="30" fill="#FFFDF8"/>
    <!-- max chars per line: 54, max lines: 2. -->
  </g>
  <text x="92" y="1058" class="footerHead">Core takeaway</text>
  <text x="92" y="1087" class="footerCopy">TurboQuant does not keep every original value. It rotates data into a more mixable space, keeps only a small number of levels,</text>
  <text x="92" y="1112" class="footerCopy">and still reconstructs something close to the original signal, like repainting from a tiny palette instead of storing every pigment.</text>
</svg>
